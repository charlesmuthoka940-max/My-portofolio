<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home | Charles</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      color: #1e293b;
      transition: 0.4s ease;
      min-height: 100vh;
      position: relative;
      padding-bottom: 80px; /* space for fixed footer */
    }

    body.dark-mode {
      background: #0f172a;
      color: #f1f5f9;
    }

    /* HEADER & NAVIGATION */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: #ffffff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    body.dark-mode .header {
      background: #1e293b;
    }

    .logo {
      font-size: 20px;
      font-weight: 600;
      color: #2563eb;
    }

    .nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    .nav a {
      text-decoration: none;
      color: inherit;
      font-size: 15px;
      transition: 0.3s;
}

    /* ICON COLOR CONTROL */
    .nav a i {
      color: #000; /* BLACK icons in light mode */
    }

    body.dark-mode .nav a i {
      color: #f1f5f9; /* WHITE icons in dark mode */
    }

    .nav a:hover,
    .nav a.active {
      color: #2563eb;
    }

    .menu-toggle {
      display: none;
      font-size: 22px;
      cursor: pointer;
    }

    .dark-toggle {
      background: #2563eb;
      border: none;
      color: white;
      padding: 8px 10px;
      border-radius: 50%;
      cursor: pointer;
    }

    /* HERO SECTION */
    .home-hero {
      text-align: center;
      padding: 80px 20px 40px;
    }

    .home-hero h1 {
      font-size: 42px;
      margin-bottom: 10px;
      animation: fadeIn 1s ease;
    }

    .home-hero span {
      color: #2563eb;
    }

    .home-hero p {
      opacity: 0.85;
      max-width: 600px;
      margin: auto;
      animation: fadeIn 1.5s ease;
    }

    .profile-img {
      margin-top: 25px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 4px solid #2563eb;
      object-fit: cover;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    /* FOOTER - ALWAYS BOTTOM */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #ffffff;
      text-align: center;
      padding: 15px;
      font-size: 14px;
      opacity: 0.9;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
    }

    body.dark-mode .footer {
      background: #1e293b;
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from {opacity:0; transform: translateY(20px);}
      to {opacity:1; transform: translateY(0);}
    }

    /* MOBILE MENU */
    @media(max-width:768px){
      .nav ul {
        position: absolute;
        background: white;
        top: 65px;
        right: 0;
        width: 220px;
        flex-direction: column;
        display: none;
        padding: 20px;
      }

      body.dark-mode .nav ul {
        background: #1e293b;
      }

      .nav ul.show {
        display: flex;
      }

      .menu-toggle {
        display: block;
      }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">Charles Portfolio</div>

  <div class="menu-toggle" id="menuToggle">
    <i class="fas fa-bars"></i>
  </div>

  <nav class="nav">
  <ul id="navMenu">
    <li><a href="index.html"><i class="fas fa-house"></i> Home</a></li>
    <li><a href="about.html"><i class="fas fa-user"></i> About</a></li>
    <li><a href="portfolio.html"><i class="fas fa-briefcase"></i> Portfolio</a></li>
    <li><a href="my-work.html"><i class="fas fa-code"></i> My Work</a></li>
    <li><a href="experience.html"><i class="fas fa-chart-line"></i> Experience</a></li>
    <li><a href="mentors.html"><i class="fas fa-user-tie"></i> Mentors</a></li>
    <li><a href="contacts.html"><i class="fas fa-envelope"></i> Contacts</a></li>
  </ul>
</nav>


  <button class="dark-toggle" id="darkModeToggle">
    <i class="fas fa-moon"></i>
  </button>
</header>

<section class="home-hero">
  <h1>Hello, I'm <span>Charles</span></h1>
  <p>
    I’m a web developer from Kenya focused on building clean, user-friendly applications and modern responsive designs.
  </p>
  <img src="charlo.jpg" alt="Charles Profile" class="profile-img">
</section>

<footer class="footer" aria-describedby="footer-desc">
    <p id="footer-desc">© Charles Muthoka. All Rights Reserved.</p>
</footer>
</footer>

<script>
const toggle = document.getElementById('menuToggle');
const nav = document.getElementById('navMenu');

toggle.onclick = () => nav.classList.toggle('show');

const darkBtn = document.getElementById('darkModeToggle');
darkBtn.onclick = () => document.body.classList.toggle('dark-mode');
</script>

</body>
</html>
